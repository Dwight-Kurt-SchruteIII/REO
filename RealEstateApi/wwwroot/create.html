<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Tenant and Payment | RealEstate Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">RealEstateApi Demo UI</p>
        <h1>Create Tenant and Payment</h1>
      </div>
      <div class="topbar-actions">
        <div class="status-row">
          <span id="apiStatus" class="status-badge status-offline">API offline</span>
          <button id="refreshBtn" class="btn btn-ghost" type="button">Refresh Data</button>
          <a href="/index.html" class="btn btn-ghost">Back to Overview</a>
        </div>
        <div class="auth-row">
          <p id="authMeta" class="auth-meta">Not signed in</p>
          <button id="logoutBtn" class="btn btn-ghost hidden" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="layout create-layout">
      <section class="panel">
        <div class="panel-head">
          <h2>Create Tenant</h2>
        </div>

        <form id="createTenantForm" class="stack-form">
          <label>Property
            <select id="tenantPropertyId" name="propertyId" required></select>
          </label>
          <label>Tenant Name
            <input name="tenantName" required minlength="2" maxlength="120" placeholder="Jan Novak">
          </label>
          <label>Monthly Rent
            <input name="monthlyRent" type="number" min="0.01" step="0.01" required>
          </label>
          <label>Start Date
            <input name="startDate" type="date" required>
          </label>
          <label>End Date
            <input name="endDate" type="date">
          </label>
          <button class="btn btn-primary" type="submit" data-write-action="true">Create Tenant</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Create Payment</h2>
        </div>

        <form id="createPaymentForm" class="stack-form">
          <label>Tenant
            <select id="paymentTenantContractId" name="tenantContractId" required></select>
          </label>
          <label>Payment Date
            <input name="paymentDate" type="date" required>
          </label>
          <label>Rent (Amount)
            <input name="amount" type="number" min="0" step="0.01" required>
          </label>
          <label>Due Date (optional)
            <input name="dueDate" type="date">
          </label>
          <button class="btn btn-primary" type="submit" data-write-action="true">Create Payment</button>
        </form>

        <div class="empty-state compact-empty">
          <p>On this page you can create both tenant contracts and payments.</p>
        </div>
      </section>
    </main>
  </div>

  <div id="notice" class="notice hidden"></div>

  <script type="module" src="/create.js"></script>
</body>
</html>
